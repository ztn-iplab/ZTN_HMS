<!-- templates/auth/login.html -->
{% extends "base.html" %}
{% block title %}Login - ZTN Hospital{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="text-center mb-4">
      <h2 class="auth-title mb-2">Welcome back</h2>
      <p class="auth-subtitle mb-0">Sign in to manage your clinic workspace.</p>
    </div>
    <form action="{{ url_for('auth.login') }}" method="post">
      <div class="mb-3">
        <label for="email" class="form-label">Email or Mobile</label>
        <input type="text" class="form-control" id="email" name="email" required />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required />
      </div>
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-danger">Login</button>
      </div>
    </form>
    <div class="text-center mt-4">
      <a href="{{ url_for('auth.forgot_password') }}">Forgot your password?</a>
    </div>
  </div>
</div>
{% endblock %}
